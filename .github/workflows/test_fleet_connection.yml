name: Test fleet health and env variable

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::416394563192:role/github-action_deploy_policy
          aws-region: us-east-1

      - name: Fleet heatlh check
        id: health
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
            "hostname -I",
            "docker --version 2>/dev/null || echo DOCKER NOT INSTALLED",
            "aws --version 2>/dev/null || echo AWS NOT INSTALLED",
            "mysql --version 2>/dev/null || echo MYSQL NOT INSTALLED",
            "aws ssm get-parameters-by-path --path /application/testing --with-decryption --region us-east-1"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Show Result
        run: |
          sleep 60

          aws ssm list-command-invocations \
            --command-id "${{ steps.health.outputs.cmd_id }}" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,IP:CommandPlugins[0].Output}" \
            --output text \
            --region us-east-1 

          FAILD=$(
            aws ssm list-command-invocations \
              --command-id "${{ steps.health.outputs.cmd_id }}" \
              --details \
              --query "length(CommandInvocations[?Status=='Faield'])" \
              --output text \
              --region us-east-1 
            )

          [ "$FAILD" -gt 0 ] && \
          echo "::error::Health Check Faild on $FAILD instance(s)" && \
          exit 1


          echo "All Instance Healthy"  
