name : Smoke Testing For Infra and Network

on: 
  workflow_call:

permissions:
  id-token: write
  contents: read
    
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::416394563192:role/github-action_deploy_policy
          aws-region: us-east-1    

      - name: Create S3 bucket if it doesn't exist
        run: |
          BUCKET_NAME=416394563192-devops-script

          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating bucket $BUCKET_NAME..."
            aws s3api create-bucket \
             --bucket "$BUCKET_NAME" \
            --region us-east-1
          else
            echo "Bucket already exists."
          fi

      - name: Upload smoke_test.py on AWS
        run: |
          aws s3 cp smoke_test.py \
          s3://416394563192-devops-script/smoke_test.py \
          --region us-east-1    

      - name: Run smoke test on fleet
        id: smoke
        run: |
          CMD_ID=$(aws ssm send-command \
          --targets "Key=tag:App,Values=flask" \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
          "aws s3 cp s3://416394563192-devops-script/smoke_test.py  /tmp/smoke_test.py",
          "python3 /tmp/smoke_test.py",
          "rm /tmp/smoke_test.py"
          ]}' \
          --query 'Command.CommandId' \
          --output text \
          --region us-east-1)

          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT  

      - name: show Result
        run: |
          sleep 30

          aws ssm list-command-invocations \
          --command-id "${{ steps.smoke.outputs.cmd_id }}"
          --details \
          --region us-east-1
          --output text

          FAILD=$(
            aws ssm list-command-invocations \
              --command-id "${{ steps.smoke.outputs.cmd_id }}" \
              --details \
              --query "length(CommandInvocations[?Status=='Failed'])" \
              --output text \
              --region us-east-1 
            )

          [ "$FAILD" -gt 0 ] && \
          echo "::error::smoke Check Faild on $FAILD instance(s)" && \
          exit 1



