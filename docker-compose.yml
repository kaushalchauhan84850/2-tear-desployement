services:
  simplebank_app:
    image: 416394563192.dkr.ecr.us-east-1.amazonaws.com/simplebank:$(IMAGE_TAG:-latest)
    container_name: simplebank_app
    ports:
      - 5000:5000
    environment: 
      FLASK_ENV: production
    restart: unless-stop   


    healthcheck:
      test: ["CMD","curl","-f","http://localhost/5000/health"] 
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s